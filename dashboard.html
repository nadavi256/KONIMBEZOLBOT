<title>Konimbezol Bot — לוח בקרה</title>
<style>
  /* ── Tokens ── */
  :root {
    --ground:   #f2f5fb;
    --surface:  #ffffff;
    --surface2: #f8faff;
    --border:   #e2e7f4;
    --ink-1:    #0f172a;
    --ink-2:    #475569;
    --ink-3:    #94a3b8;
    --accent:   #2563eb;
    --accent-h: #1d4ed8;
    --success:  #16a34a;
    --warning:  #d97706;
    --danger:   #dc2626;
    --radius:   10px;
    --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono:     'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --shadow:   0 1px 3px rgba(15,23,42,.07), 0 1px 2px rgba(15,23,42,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground:   #090d18;
      --surface:  #111827;
      --surface2: #151e30;
      --border:   #1e293b;
      --ink-1:    #f1f5f9;
      --ink-2:    #94a3b8;
      --ink-3:    #475569;
      --accent:   #3b82f6;
      --accent-h: #60a5fa;
      --shadow:   0 1px 3px rgba(0,0,0,.3);
    }
  }
  :root[data-theme="dark"] {
    --ground:   #090d18;
    --surface:  #111827;
    --surface2: #151e30;
    --border:   #1e293b;
    --ink-1:    #f1f5f9;
    --ink-2:    #94a3b8;
    --ink-3:    #475569;
    --accent:   #3b82f6;
    --accent-h: #60a5fa;
    --shadow:   0 1px 3px rgba(0,0,0,.3);
  }
  :root[data-theme="light"] {
    --ground:   #f2f5fb;
    --surface:  #ffffff;
    --surface2: #f8faff;
    --border:   #e2e7f4;
    --ink-1:    #0f172a;
    --ink-2:    #475569;
    --ink-3:    #94a3b8;
    --accent:   #2563eb;
    --accent-h: #1d4ed8;
    --shadow:   0 1px 3px rgba(15,23,42,.07);
  }

  /* Category colors */
  .cat--gadget     { --cat: #3b82f6; }
  .cat--fashion    { --cat: #ec4899; }
  .cat--sport      { --cat: #10b981; }
  .cat--kitchen    { --cat: #f59e0b; }
  .cat--car        { --cat: #6366f1; }
  .cat--home       { --cat: #84cc16; }
  .cat--watch      { --cat: #eab308; }
  .cat--tools      { --cat: #f97316; }
  .cat--kids       { --cat: #a855f7; }
  .cat--special    { --cat: #14b8a6; }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font);
    background: var(--ground);
    color: var(--ink-1);
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-h); text-decoration: underline; }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-brand .logo {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    font-weight: 700;
  }
  .header-brand h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink-1);
  }
  .header-brand span {
    font-size: .8rem;
    color: var(--ink-3);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .8rem;
    color: var(--ink-2);
  }
  .status-dot::before {
    content: '';
    display: block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 2px rgba(22,163,74,.2);
  }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    color: var(--ink-2);
    font-size: .8rem;
    font-family: var(--font);
  }
  .theme-toggle:hover { background: var(--surface2); }

  main {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── KPI tiles ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .kpi-label {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--ink-1);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .kpi-value.accent { color: var(--accent); }
  .kpi-sub {
    font-size: .75rem;
    color: var(--ink-3);
    margin-top: 4px;
  }

  /* ── Content grid ── */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 16px;
    align-items: start;
  }

  /* ── Panel shared ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: .85rem;
    font-weight: 600;
    color: var(--ink-1);
  }
  .panel-meta {
    font-size: .75rem;
    color: var(--ink-3);
  }
  .panel-body { padding: 4px 0; }

  /* ── Deal feed ── */
  .deal-item {
    display: flex;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
    transition: background .1s;
  }
  .deal-item:last-child { border-bottom: none; }
  .deal-item:hover { background: var(--surface2); }

  .deal-time {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--ink-3);
    white-space: nowrap;
    padding-top: 2px;
    min-width: 40px;
    font-variant-numeric: tabular-nums;
  }
  .deal-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--cat, var(--accent));
    flex-shrink: 0;
    align-self: stretch;
    min-height: 36px;
  }
  .deal-info { flex: 1; min-width: 0; }
  .deal-name {
    font-size: .85rem;
    font-weight: 500;
    color: var(--ink-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
    direction: ltr;
  }
  .deal-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .cat-badge {
    font-size: .68rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    background: color-mix(in srgb, var(--cat, var(--accent)) 12%, transparent);
    color: var(--cat, var(--accent));
    white-space: nowrap;
  }
  .deal-link {
    font-size: .68rem;
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .deal-link:hover { color: var(--accent); }

  /* ── Sidebar: chart + categories ── */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .chart-wrap { padding: 16px 18px; }
  .chart-title {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  canvas { display: block; width: 100% !important; }

  /* ── Category breakdown ── */
  .cat-list { padding: 0 18px 12px; }
  .cat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cat, var(--accent));
    flex-shrink: 0;
  }
  .cat-name {
    flex: 1;
    font-size: .8rem;
    color: var(--ink-2);
    direction: rtl;
    text-align: right;
  }
  .cat-count {
    font-family: var(--mono);
    font-size: .78rem;
    font-weight: 600;
    color: var(--ink-1);
    font-variant-numeric: tabular-nums;
  }
  .cat-bar-track {
    width: 60px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%;
    background: var(--cat, var(--accent));
    border-radius: 2px;
  }

  /* ── History ── */
  .history-section { display: flex; flex-direction: column; gap: 10px; }
  .history-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .history-day summary {
    list-style: none;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
  }
  .history-day[open] summary { border-bottom-color: var(--border); }
  .history-day summary::-webkit-details-marker { display: none; }
  .history-day summary:hover { background: var(--surface2); }
  .history-date {
    font-size: .85rem;
    font-weight: 600;
    color: var(--ink-1);
  }
  .history-count {
    font-size: .75rem;
    font-family: var(--mono);
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chevron {
    width: 14px; height: 14px;
    border-right: 2px solid var(--ink-3);
    border-bottom: 2px solid var(--ink-3);
    transform: rotate(45deg);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .history-day[open] .chevron { transform: rotate(-135deg); }

  /* ── Empty state ── */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-3);
    font-size: .85rem;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .content-grid { grid-template-columns: 1fr; }
    .sidebar { flex-direction: row; flex-wrap: wrap; }
    .sidebar .panel { flex: 1; min-width: 240px; }
  }
  @media (max-width: 500px) {
    main { padding: 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .kpi-value { font-size: 1.6rem; }
  }
</style>

<div class="app">
  <header>
    <div class="header-brand">
      <div class="logo">K</div>
      <div>
        <h1>Konimbezol Bot <span>לוח בקרה</span></h1>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot">בוט פעיל</div>
      <button class="theme-toggle" onclick="toggleTheme()">◐ ערכת נושא</button>
    </div>
  </header>

  <main>
    <!-- KPI row -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">דילים היום</div>
        <div class="kpi-value accent" id="kpi-today">—</div>
        <div class="kpi-sub" id="kpi-today-time">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">השבוע</div>
        <div class="kpi-value" id="kpi-week">—</div>
        <div class="kpi-sub" id="kpi-week-sub">7 ימים אחרונים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">קטגוריות פעילות</div>
        <div class="kpi-value" id="kpi-cats">—</div>
        <div class="kpi-sub">מתוך 10 קטגוריות</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">חלון שנשלח</div>
        <div class="kpi-value" id="kpi-window">—</div>
        <div class="kpi-sub">מתוך 70 מקסימום</div>
      </div>
    </div>

    <!-- Content -->
    <div class="content-grid">
      <!-- Feed -->
      <div class="panel" id="feed-panel">
        <div class="panel-header">
          <span class="panel-title">📤 דילים שנשלחו היום</span>
          <span class="panel-meta" id="feed-date">—</span>
        </div>
        <div class="panel-body" id="feed-body">
          <div class="empty">טוען נתונים…</div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Chart -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📊 דילים ב-7 ימים</span>
          </div>
          <div class="chart-wrap">
            <canvas id="chart" height="140"></canvas>
          </div>
        </div>

        <!-- Categories -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🏷 לפי קטגוריה (היום)</span>
          </div>
          <div class="cat-list" id="cat-list">
            <div class="empty">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div>
      <div style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-3); font-weight:600; margin-bottom:10px; padding:0 2px;">
        היסטוריה — 30 ימים אחרונים
      </div>
      <div class="history-section" id="history-section">
        <div class="empty">טוען…</div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────
function toggleTheme() {
  const r = document.documentElement;
  const cur = r.dataset.theme;
  const pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  if (!cur) { r.dataset.theme = pref === 'dark' ? 'light' : 'dark'; }
  else if (cur === 'dark') { r.dataset.theme = 'light'; }
  else { delete r.dataset.theme; }
}

// ── Category meta ──────────────────────────────────────────────
const CATS = {
  'גאדג\'טים':        { emoji: '📱', cls: 'cat--gadget',  color: '#3b82f6' },
  'אופנה וסטייל':    { emoji: '👗', cls: 'cat--fashion', color: '#ec4899' },
  'ספורט וכושר':     { emoji: '💪', cls: 'cat--sport',   color: '#10b981' },
  'מוצרי מטבח':      { emoji: '🍳', cls: 'cat--kitchen', color: '#f59e0b' },
  'מוצרים לרכב':     { emoji: '🚗', cls: 'cat--car',     color: '#6366f1' },
  'בית וגן':          { emoji: '🏠', cls: 'cat--home',    color: '#84cc16' },
  'שעונים ותכשיטים': { emoji: '⌚', cls: 'cat--watch',   color: '#eab308' },
  'כלי עבודה':        { emoji: '🔧', cls: 'cat--tools',   color: '#f97316' },
  'מוצרים לילדים':   { emoji: '🎁', cls: 'cat--kids',    color: '#a855f7' },
  'מוצר מומלץ':      { emoji: '⭐', cls: 'cat--special', color: '#14b8a6' },
};
function catMeta(cat) {
  return CATS[cat] || { emoji: '📦', cls: '', color: '#3b82f6' };
}

// ── Helpers ────────────────────────────────────────────────────
function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${parseInt(day)} ${months[parseInt(m)]} ${y}`;
}
function isToday(d) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  return d === `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
}
function slugify(url) {
  return url ? url.split('/product/')[1] || url : '';
}

// ── Render feed ────────────────────────────────────────────────
function renderFeed(items) {
  const el = document.getElementById('feed-body');
  if (!items || !items.length) {
    el.innerHTML = '<div class="empty">עוד לא נשלחו דילים היום</div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const m = catMeta(item.category);
    const slug = slugify(item.url);
    return `<div class="deal-item ${m.cls}">
      <span class="deal-time">${item.time || ''}</span>
      <div class="deal-bar"></div>
      <div class="deal-info">
        <div class="deal-name" title="${item.name}">${item.name}</div>
        <div class="deal-meta">
          <span class="cat-badge ${m.cls}">${m.emoji} ${item.category}</span>
          ${item.link ? `<a class="deal-link" href="${item.link}" target="_blank" rel="noopener">↗ AliExpress</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Render categories ──────────────────────────────────────────
function renderCats(items) {
  const el = document.getElementById('cat-list');
  if (!items || !items.length) { el.innerHTML = ''; return; }
  const counts = {};
  items.forEach(i => { counts[i.category] = (counts[i.category]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0][1];
  el.innerHTML = sorted.map(([cat, n]) => {
    const m = catMeta(cat);
    const pct = Math.round(n/max*100);
    return `<div class="cat-row ${m.cls}">
      <div class="cat-dot"></div>
      <div class="cat-name">${m.emoji} ${cat}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
      <div class="cat-count">${n}</div>
    </div>`;
  }).join('');
}

// ── Draw chart ─────────────────────────────────────────────────
function drawChart(byDate) {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 36;
  const H = 140;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Last 7 days
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const pad = n => String(n).padStart(2,'0');
    const key = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const label = i===0 ? 'היום' : pad(d.getDate())+'/'+pad(d.getMonth()+1);
    days.push({ key, label, count: (byDate[key]||[]).length });
  }

  const max = Math.max(...days.map(d=>d.count), 1);
  const pad = { l:4, r:4, t:10, b:28 };
  const barW = Math.floor((W - pad.l - pad.r) / 7) - 4;

  // CSS variable values for theming
  const cs = getComputedStyle(document.documentElement);
  const isDark = document.documentElement.dataset.theme === 'dark' ||
    (!document.documentElement.dataset.theme && window.matchMedia('(prefers-color-scheme:dark)').matches);
  const accentColor = isDark ? '#3b82f6' : '#2563eb';
  const mutedColor = isDark ? '#1e293b' : '#e2e7f4';
  const textColor = isDark ? '#64748b' : '#94a3b8';
  const accentFaint = isDark ? 'rgba(59,130,246,.15)' : 'rgba(37,99,235,.08)';

  days.forEach((d, i) => {
    const x = pad.l + i * ((W - pad.l - pad.r) / 7) + ((W - pad.l - pad.r)/7 - barW)/2;
    const barH = d.count > 0 ? Math.max(4, (d.count/max)*(H-pad.t-pad.b)) : 0;
    const y = H - pad.b - barH;
    const isToday = i === 6;

    // Bar
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 3);
    ctx.fillStyle = isToday ? accentColor : (d.count > 0 ? accentFaint : mutedColor);
    ctx.fill();

    // Today's bar: glow
    if (isToday && d.count > 0) {
      const grad = ctx.createLinearGradient(x, y, x, H-pad.b);
      grad.addColorStop(0, accentColor);
      grad.addColorStop(1, accentColor + '88');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, barH, 3);
      ctx.fill();
    }

    // Count label above bar
    if (d.count > 0) {
      ctx.fillStyle = isToday ? accentColor : textColor;
      ctx.font = `600 ${isToday?'11':'10'}px -apple-system,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(d.count, x + barW/2, y - 3);
    }

    // Date label
    ctx.fillStyle = isToday ? accentColor : textColor;
    ctx.font = `${isToday?'600':'400'} 10px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x + barW/2, H - 6);
  });
}

// ── Render history ─────────────────────────────────────────────
function renderHistory(byDate) {
  const el = document.getElementById('history-section');
  const dates = Object.keys(byDate).sort().reverse();
  if (!dates.length) { el.innerHTML = '<div class="empty">אין היסטוריה עדיין</div>'; return; }
  el.innerHTML = dates.map((date, idx) => {
    const items = byDate[date];
    const isOpen = idx === 0;
    const cats = [...new Set(items.map(i=>i.category))].map(c=>catMeta(c).emoji).join(' ');
    return `<details class="history-day" ${isOpen?'open':''}>
      <summary>
        <div>
          <div class="history-date">${formatDate(date)}</div>
          <div style="font-size:.72rem;color:var(--ink-3);margin-top:2px;">${cats}</div>
        </div>
        <div class="history-count">
          <span>${items.length} דילים</span>
          <div class="chevron"></div>
        </div>
      </summary>
      <div class="panel-body">
        ${items.map(item => {
          const m = catMeta(item.category);
          return `<div class="deal-item ${m.cls}">
            <span class="deal-time">${item.time||''}</span>
            <div class="deal-bar"></div>
            <div class="deal-info">
              <div class="deal-name">${item.name}</div>
              <div class="deal-meta">
                <span class="cat-badge ${m.cls}">${m.emoji} ${item.category}</span>
                ${item.link ? `<a class="deal-link" href="${item.link}" target="_blank" rel="noopener">↗ AliExpress</a>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </details>`;
  }).join('');
}

async function loadRealData() {
  try {
    const r = await fetch(RAW_URL, {cache:'no-cache'});
    if (!r.ok) throw new Error('fetch failed');
    return await r.json();
  } catch(e) {
    return null;
  }
}

async function init() {
  // Try real data; fall back to mock
  const IS_ARTIFACT = window.location.protocol === 'null:' || window.location.href.includes('claude.ai') || window.location.href.includes('artifacts');
  let data;
  if (!IS_ARTIFACT) {
    data = await loadRealData();
  }
  if (!data) data = MOCK_DATA;

  // Group by date
  const byDate = {};
  data.forEach(item => {
    if (!byDate[item.date]) byDate[item.date] = [];
    byDate[item.date].push(item);
  });

  // Today key
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayKey = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const todayItems = byDate[todayKey] || [];

  // KPIs
  const weekKeys = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;});
  const weekCount = weekKeys.reduce((s,k)=>s+(byDate[k]||[]).length, 0);
  const activeCats = new Set(todayItems.map(i=>i.category)).size;

  document.getElementById('kpi-today').textContent = todayItems.length;
  document.getElementById('kpi-today-time').textContent = todayItems.length ? `אחרון ב-${todayItems[todayItems.length-1].time}` : 'עדיין לא נשלח';
  document.getElementById('kpi-week').textContent = weekCount;
  document.getElementById('kpi-cats').textContent = activeCats || '—';
  document.getElementById('kpi-window').textContent = data.length > 0 ? Math.min(data.length, 70) : '0';
  document.getElementById('feed-date').textContent = formatDate(todayKey);

  // Feed
  renderFeed(todayItems);
  renderCats(todayItems);
  drawChart(byDate);
  renderHistory(byDate);
}
