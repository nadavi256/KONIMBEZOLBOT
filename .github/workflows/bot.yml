name: Telegram Bot - Hourly Products

on:
  workflow_dispatch:        # Triggered by cron-job.org every 15 min + manual

jobs:
  send-products:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Configure git
        run: |
          git config user.email "bot@bot.com"
          git config user.name "bot"

      - name: Send products to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: "-1002004379375"
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python bot.py send-now
