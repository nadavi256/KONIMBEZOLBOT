name: Telegram Bot - Hourly Products

on:
  schedule:
    # Every hour 09:00-22:00 Israel time (UTC+3 = 06:00-19:00 UTC)
    - cron: '0 6 * * *'   # 09:00 IL
    - cron: '0 7 * * *'   # 10:00 IL
    - cron: '0 8 * * *'   # 11:00 IL
    - cron: '0 9 * * *'   # 12:00 IL
    - cron: '0 10 * * *'  # 13:00 IL
    - cron: '0 11 * * *'  # 14:00 IL
    - cron: '0 12 * * *'  # 15:00 IL
    - cron: '0 13 * * *'  # 16:00 IL
    - cron: '0 14 * * *'  # 17:00 IL
    - cron: '0 15 * * *'  # 18:00 IL
    - cron: '0 16 * * *'  # 19:00 IL
    - cron: '0 17 * * *'  # 20:00 IL
    - cron: '0 18 * * *'  # 21:00 IL
    - cron: '0 19 * * *'  # 22:00 IL
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  send-products:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Send products to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: "-1002004379375"
        run: python bot.py send-now
