name: Telegram Bot - Hourly Products

on:
  schedule:
    # Every 15 minutes, 09:00-22:00 Israel time (UTC+3 = 06:00-19:00 UTC)
    - cron: '*/15 6-19 * * *'
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  send-products:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Send products to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: "-1002004379375"
        run: python bot.py send-now
