name: Daily Deal Report - 23:00 IL

on:
  workflow_dispatch:
  schedule:
    # 23:00 Israel time = 20:00 UTC (UTC+3)
    - cron: '0 20 * * *'

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install python-telegram-bot==20.7 pytz requests python-dotenv

      - name: Build report
        id: report
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python report.py --output-file /tmp/report.txt

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: nadavi256@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📊 דוח דילים יומי — KonimBezol"
          to: nadavi256@gmail.com
          from: KonimBezol Bot <nadavi256@gmail.com>
          body: file:///tmp/report.txt
          content_type: text/plain; charset=utf-8
